<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
  </head>
  <body>

    <header class="page-header" role="banner">
      <div class="container">
        {% if site.header_logo %}
          <img src="{{ site.header_logo | relative_url }}" alt="Logo" style="float: left; margin-right: 20px; height: 80px; width: auto; border-radius: 8px;">
        {% endif %}

        <div style="display: inline-block;">
          <h1 class="project-name">{{ site.title }}</h1>
          <h2 class="project-tagline">{{ site.description }}</h2>
        </div>
      </div>
    </header>

    <main id="content" class="main-content" role="main">
      <div class="container">
        {{ content }}

        <footer class="site-footer">
          <span class="site-footer-owner">Miracle Ostrich is maintained by {{ site.github.owner_name }}.</span>
        </footer>
      </div>
    </main>

  </body>
</html>
