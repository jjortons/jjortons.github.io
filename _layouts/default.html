<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
  </head>
  <body>
    <header>
      <div class="container">
        {% if site.header_logo %}
          <img src="{{ site.header_logo | relative_url }}" alt="Logo" style="float: left; margin-right: 20px; height: 70px; width: auto; border-radius: 8px;">
        {% endif %}

        <div style="display: inline-block;">
          <a id="a-title" href="{{ '/' | relative_url }}">
            <h1>{{ site.title }}</h1>
          </a>
          <h2>{{ site.description }}</h2>
        </div>

        {% if site.github.is_project_page %}
          <a href="{{ site.github.repository_url }}" class="btn btn-github"><span class="icon"></span>View on GitHub</a>
        {% endif %}
      </div>
    </header>

    <section class="main-content">
      <div class="container">
        {{ content }}
      </div>

      <footer class="site-footer">
        <span class="site-footer-owner"><a href="{{ site.github.repository_url }}">{{ site.github.repository_name }}</a> is maintained by <a href="{{ site.github.owner_name }}">{{ site.github.owner_name }}</a>.</span>
        <span class="site-footer-credits">This page was generated by <a href="https://pages.github.com">GitHub Pages</a>.</span>
      </footer>
    </section>
  </body>
</html>
