---
layout: default
---

{% for category in site.categories %}
  <h2>{{ category | first | capitalize }}</h2>
  <ul>
    {% for post in category.last %}
      <li>
        <a href="{{ post.url }}">{{ post.title }}</a> — {{ post.date | date: "%B %d, %Y" }}
      </li>
    {% endfor %}
  </ul>
{% endfor %}
